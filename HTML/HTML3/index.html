<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
</head>
<body>
    <style>
        .center{
            display: block;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }
    </style>
    <img class="center" src="https://web.archive.org/web/19990504112211im_/http://www.google.com/google.jpg" alt="Google">
    <div class="center" style="background-color:rgb(238,238,238)">
        Search the web using Google! <br>
        <input type="text">
        <br>
        <button type="submit">Google Search</button>
        <button type="submit">I'm feeling lucky</button>
    </div> 
    <table style="width: 100%;">
        <tr>
            <td style="background-color: #7EE5DA;text-align: center;">
                Special Searches <br>
                <a href="https://web.archive.org/web/19990224014327/http://www.google.com/stanford">Stanford Search</a><br>
                <a href="https://web.archive.org/web/19981202230410/http:/www.google.com/linux">Linux Search</a><br>
            </td>
            <td style="background-color: #70CCC2;text-align: center;">
                <a href="https://web.archive.org/web/19981202230410if_/http:/www.google.com/help.html">Help!</a><br>
                <a href="https://web.archive.org/web/19990427105230if_/http://www.google.com/about.html">About Google!</a><br>
                <a href="https://web.archive.org/web/19990221202430if_/http://www.google.com/company.html">Company Info</a><br>
                <a href="https://web.archive.org/web/19990224043535if_/http://www.google.com/stickers.html">Google! Logos</a>           
            </td>
            <td style="background-color: #62B3AA;text-align: center;">
                Get Google! <br>
                updates monthly: <br>
                <input type="email" placeholder="your e-mail"><br>
                <button>Subscribe</button>
                <a href="https://web.archive.org/web/19990116224431/http://www.findmail.com/list/google-friends">Archive</a>
            </td>
        </tr>
    </table> 

    <p class="center">Copyright ©1998 Google Inc..</p>

</body>
</html>
